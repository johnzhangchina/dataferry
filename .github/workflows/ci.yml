name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd web/frontend && npm ci

      - name: Build frontend
        run: cd web/frontend && npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/dataferry
